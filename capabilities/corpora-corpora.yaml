naftiko: 1.0.0-alpha2
info:
  label: Vectara Corpora API — Corpora
  description: 'Vectara Corpora API — Corpora. CRUD operations on corpora that hold indexed documents for retrieval and grounded
    generation. Self-contained Naftiko capability covering one Vectara business surface.'
  tags:
  - Vectara
  - Corpora
  - Admin
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    VECTARA_API_KEY: VECTARA_API_KEY
capability:
  consumes:
  - type: http
    namespace: corpora-corpora
    baseUri: https://api.vectara.io
    description: Vectara Corpora API. Self-contained, no shared references.
    resources:
    - name: v2-corpora
      path: /v2/corpora
      operations:
      - name: listcorpora
        method: GET
        description: List corpora.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
        - name: page_key
          in: query
          type: string
          required: false
      - name: createcorpus
        method: POST
        description: Create a corpus.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: v2-corpora-by-key
      path: /v2/corpora/{corpus_key}
      operations:
      - name: getcorpus
        method: GET
        description: Retrieve corpus metadata.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: corpus_key
          in: path
          type: string
          required: true
      - name: updatecorpus
        method: PATCH
        description: Update a corpus.
        outputRawFormat: json
        inputParameters:
        - name: corpus_key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletecorpus
        method: DELETE
        description: Delete a corpus.
        inputParameters:
        - name: corpus_key
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.VECTARA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: corpora-corpora-rest
    port: 8080
    description: REST adapter for Vectara Corpora API.
    resources:
    - path: /v1/v2/corpora
      name: v2-corpora
      operations:
      - method: GET
        name: listcorpora
        call: corpora-corpora.listcorpora
      - method: POST
        name: createcorpus
        call: corpora-corpora.createcorpus
        with:
          body: rest.body
    - path: /v1/v2/corpora/{corpus_key}
      name: v2-corpora-by-key
      operations:
      - method: GET
        name: getcorpus
        call: corpora-corpora.getcorpus
      - method: PATCH
        name: updatecorpus
        call: corpora-corpora.updatecorpus
        with:
          body: rest.body
      - method: DELETE
        name: deletecorpus
        call: corpora-corpora.deletecorpus
